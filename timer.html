<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      font-family: 'Inter', sans-serif;
      background: #0f0e17;
      overflow: hidden;
    }

    /* 背景の光源 */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      top: 40%; right: -50px;
    }

    body > * { position: relative; z-index: 1; }

    /* ヘッダー */
    h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    /* カード */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 32px 36px 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.06);
      width: 380px;
    }

    /* タブ */
    .tabs {
      display: flex;
      gap: 2px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 3px;
    }

    .tab {
      flex: 1;
      padding: 8px 0;
      border-radius: 9px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      background: none;
      color: rgba(255,255,255,0.3);
      border: none;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .tab.active {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .tab:hover:not(.active) {
      color: rgba(255,255,255,0.5);
    }

    /* パネル */
    .panel { display: none; flex-direction: column; align-items: center; gap: 20px; }
    .panel.active { display: flex; }

    /* ディスプレイ */
    .display {
      font-family: 'DM Mono', monospace;
      font-size: 64px;
      font-weight: 400;
      letter-spacing: -1px;
      color: rgba(255,255,255,0.9);
      text-align: center;
      width: 100%;
      transition: color 0.3s;
      line-height: 1;
    }

    .display.danger {
      color: #f87171;
      animation: pulse 0.6s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* プログレスバー */
    .progress-bar {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 99px;
      transition: width 1s linear;
    }

    /* ボタン行 */
    .btn-row { display: flex; gap: 8px; width: 100%; }

    .btn {
      flex: 1;
      padding: 11px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.3px;
    }

    .btn:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      border-color: rgba(255,255,255,0.15);
    }

    .btn:active { transform: scale(0.98); }

    .btn.primary {
      background: rgba(124,58,237,0.5);
      border-color: rgba(167,139,250,0.35);
      color: rgba(255,255,255,0.9);
      box-shadow: 0 2px 12px rgba(124,58,237,0.25);
    }

    .btn.primary:hover {
      background: rgba(124,58,237,0.65);
      box-shadow: 0 4px 18px rgba(124,58,237,0.35);
    }

    .btn.danger-btn {
      color: rgba(248,113,113,0.7);
      border-color: rgba(248,113,113,0.15);
    }

    .btn.danger-btn:hover {
      background: rgba(248,113,113,0.08);
      color: #f87171;
      border-color: rgba(248,113,113,0.25);
    }

    /* 区切り */
    .sep {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    /* タイマー入力 */
    .time-inputs {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      justify-content: center;
    }

    .time-input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .time-input-group label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    .spin-btn {
      width: 72px;
      padding: 4px 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      font-family: 'Inter', sans-serif;
    }

    .spin-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
    }

    .spin-btn:active {
      background: rgba(124,58,237,0.2);
      transform: scale(0.97);
    }

    .time-input-group input {
      width: 72px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      font-family: 'DM Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      padding: 6px 4px;
      border-radius: 8px;
      outline: none;
      cursor: ns-resize;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .time-input-group input:focus {
      border-color: rgba(167,139,250,0.5);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
    }

    .time-input-group input::-webkit-inner-spin-button,
    .time-input-group input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .time-input-group input[type=number] { -moz-appearance: textfield; }

    .colon {
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      font-weight: 400;
      color: rgba(255,255,255,0.15);
      margin-top: 4px;
      line-height: 1;
    }

    /* ストップウォッチ ラップ */
    .laps {
      width: 100%;
      max-height: 180px;
      overflow-y: auto;
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .laps:empty { display: none; }

    .laps::-webkit-scrollbar { width: 3px; }
    .laps::-webkit-scrollbar-track { background: transparent; }
    .laps::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .lap-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      font-family: 'DM Mono', monospace;
    }

    .lap-item:last-child { border-bottom: none; }
    .lap-item:first-child { color: rgba(255,255,255,0.75); }

    .lap-num {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      min-width: 40px;
    }

    .lap-total { color: rgba(255,255,255,0.18); }

    /* ポモドーロ */
    .pomo-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .pomodoro-count { display: flex; gap: 8px; }

    .tomato {
      font-size: 20px;
      opacity: 0.15;
      transition: opacity 0.4s, filter 0.4s;
      filter: grayscale(1) brightness(0.6);
    }

    .tomato.done {
      opacity: 0.9;
      filter: grayscale(0);
    }

    .pomodoro-status {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      transition: color 0.4s;
    }

    .pomodoro-status.work  { color: #fb923c; }
    .pomodoro-status.break { color: #34d399; }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: rgba(20,18,35,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 11px 22px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      pointer-events: none;
      backdrop-filter: blur(16px);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="orb"></div>

<h1>Timer</h1>

<div class="tabs">
  <button class="tab active" onclick="switchTab('countdown')">タイマー</button>
  <button class="tab" onclick="switchTab('stopwatch')">ストップウォッチ</button>
  <button class="tab" onclick="switchTab('pomodoro')">ポモドーロ</button>
</div>

<div class="card">

  <!-- タイマー -->
  <div id="panel-countdown" class="panel active">
    <div class="time-inputs" id="countdown-inputs">
      <div class="time-input-group">
        <label>時</label>
        <button class="spin-btn" onclick="stepInput('in-h',1,0,23)">▲</button>
        <input type="number" id="in-h" min="0" max="23" value="0" oninput="clampInput(this,0,23)">
        <button class="spin-btn" onclick="stepInput('in-h',-1,0,23)">▼</button>
      </div>
      <div class="colon">:</div>
      <div class="time-input-group">
        <label>分</label>
        <button class="spin-btn" onclick="stepInput('in-m',1,0,59)">▲</button>
        <input type="number" id="in-m" min="0" max="59" value="5" oninput="clampInput(this,0,59)">
        <button class="spin-btn" onclick="stepInput('in-m',-1,0,59)">▼</button>
      </div>
      <div class="colon">:</div>
      <div class="time-input-group">
        <label>秒</label>
        <button class="spin-btn" onclick="stepInput('in-s',1,0,59)">▲</button>
        <input type="number" id="in-s" min="0" max="59" value="0" oninput="clampInput(this,0,59)">
        <button class="spin-btn" onclick="stepInput('in-s',-1,0,59)">▼</button>
      </div>
    </div>

    <div class="sep"></div>
    <div class="display" id="countdown-display">00:05:00</div>
    <div class="progress-bar">
      <div class="progress-fill" id="countdown-progress" style="width:100%"></div>
    </div>

    <div class="btn-row">
      <button class="btn primary" id="countdown-start-btn" onclick="countdownStart()">スタート</button>
      <button class="btn" onclick="countdownReset()">リセット</button>
    </div>
  </div>

  <!-- ストップウォッチ -->
  <div id="panel-stopwatch" class="panel">
    <div class="display" id="sw-display">00:00:00.00</div>

    <div class="btn-row">
      <button class="btn primary" id="sw-start-btn" onclick="swToggle()">スタート</button>
      <button class="btn" onclick="swLap()">ラップ</button>
      <button class="btn danger-btn" onclick="swReset()">リセット</button>
    </div>

    <div class="laps" id="laps"></div>
  </div>

  <!-- ポモドーロ -->
  <div id="panel-pomodoro" class="panel">
    <div class="pomo-top">
      <div class="pomodoro-count" id="pomo-tomatoes">
        <span class="tomato">🍅</span>
        <span class="tomato">🍅</span>
        <span class="tomato">🍅</span>
        <span class="tomato">🍅</span>
      </div>
      <div class="pomodoro-status" id="pomo-status">WORK</div>
    </div>

    <div class="display" id="pomo-display">25:00</div>
    <div class="progress-bar">
      <div class="progress-fill" id="pomo-progress" style="width:100%"></div>
    </div>

    <div class="btn-row">
      <button class="btn primary" id="pomo-start-btn" onclick="pomoToggle()">スタート</button>
      <button class="btn danger-btn" onclick="pomoReset()">リセット</button>
    </div>
  </div>

</div><!-- /card -->

<div class="toast" id="toast"></div>

<script>
// ---- ユーティリティ ----
function pad(n, d=2) { return String(n).padStart(d, '0'); }

function clampInput(el, min, max) {
  let v = parseInt(el.value) || 0;
  if (v < min) el.value = min;
  if (v > max) el.value = max;
  updateCountdownDisplay();
}

function stepInput(id, delta, min, max) {
  if (cdRunning) return;
  const el = document.getElementById(id);
  let v = (parseInt(el.value) || 0) + delta;
  if (v < min) v = min;
  if (v > max) v = max;
  el.value = v;
  updateCountdownDisplay();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

function beep(freq=880, dur=0.5, type='sine') {
  try {
    const ctx = new AudioContext();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    o.type = type;
    g.gain.setValueAtTime(0.4, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
    setTimeout(() => ctx.close(), (dur + 0.1) * 1000);
  } catch(e) {}
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['countdown','stopwatch','pomodoro'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

// ---- タイマー (カウントダウン) ----
let cdInterval = null;
let cdRemaining = 0;
let cdTotal = 0;
let cdRunning = false;

function getInputSeconds() {
  const h = parseInt(document.getElementById('in-h').value) || 0;
  const m = parseInt(document.getElementById('in-m').value) || 0;
  const s = parseInt(document.getElementById('in-s').value) || 0;
  return h * 3600 + m * 60 + s;
}

function updateCountdownDisplay() {
  const secs = getInputSeconds();
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  document.getElementById('countdown-display').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function renderCountdown(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  const el = document.getElementById('countdown-display');
  el.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
  el.classList.toggle('danger', secs <= 10 && secs > 0);
  const pct = cdTotal > 0 ? (secs / cdTotal) * 100 : 100;
  document.getElementById('countdown-progress').style.width = pct + '%';
}

function countdownStart() {
  if (cdRunning) {
    clearInterval(cdInterval);
    cdRunning = false;
    document.getElementById('countdown-start-btn').textContent = '再開';
    document.getElementById('countdown-inputs').style.pointerEvents = 'none';
    document.getElementById('countdown-inputs').style.opacity = '0.4';
    return;
  }

  if (cdRemaining === 0) {
    cdRemaining = getInputSeconds();
    cdTotal = cdRemaining;
    if (cdRemaining === 0) return;
  }

  document.getElementById('countdown-inputs').style.pointerEvents = 'none';
  document.getElementById('countdown-inputs').style.opacity = '0.4';
  document.getElementById('countdown-start-btn').textContent = '一時停止';
  cdRunning = true;

  cdInterval = setInterval(() => {
    cdRemaining--;
    renderCountdown(cdRemaining);
    if (cdRemaining <= 0) {
      clearInterval(cdInterval);
      cdRunning = false;
      document.getElementById('countdown-start-btn').textContent = 'スタート';
      document.getElementById('countdown-inputs').style.pointerEvents = '';
      document.getElementById('countdown-inputs').style.opacity = '1';
      beep(660, 0.3); setTimeout(() => beep(880, 0.5), 350);
      showToast('⏰ タイマー終了！');
      cdRemaining = 0;
    }
  }, 1000);
}

function countdownReset() {
  clearInterval(cdInterval);
  cdRunning = false;
  cdRemaining = 0;
  cdTotal = 0;
  document.getElementById('countdown-start-btn').textContent = 'スタート';
  document.getElementById('countdown-inputs').style.pointerEvents = '';
  document.getElementById('countdown-inputs').style.opacity = '1';
  updateCountdownDisplay();
  document.getElementById('countdown-progress').style.width = '100%';
  document.getElementById('countdown-display').classList.remove('danger');
}

// スクロール操作
const cdInputDefs = [
  { id: 'in-h', min: 0, max: 23 },
  { id: 'in-m', min: 0, max: 59 },
  { id: 'in-s', min: 0, max: 59 },
];
cdInputDefs.forEach(({ id, min, max }) => {
  const el = document.getElementById(id);
  el.addEventListener('input', updateCountdownDisplay);
  el.addEventListener('wheel', (e) => {
    if (cdRunning) return;
    e.preventDefault();
    let v = parseInt(el.value) || 0;
    v += e.deltaY < 0 ? 1 : -1;
    if (v < min) v = min;
    if (v > max) v = max;
    el.value = v;
    updateCountdownDisplay();
  }, { passive: false });
});
updateCountdownDisplay();

// ---- ストップウォッチ ----
let swRunning = false;
let swInterval = null;
let swElapsed = 0;
let swLapStart = 0;
let swLaps = [];

function renderSW(ms) {
  const cs = Math.floor((ms % 1000) / 10);
  const s  = Math.floor(ms / 1000) % 60;
  const m  = Math.floor(ms / 60000) % 60;
  const h  = Math.floor(ms / 3600000);
  document.getElementById('sw-display').textContent =
    `${pad(h)}:${pad(m)}:${pad(s)}.${pad(cs)}`;
}

function swToggle() {
  if (swRunning) {
    clearInterval(swInterval);
    swRunning = false;
    document.getElementById('sw-start-btn').textContent = '再開';
  } else {
    const start = Date.now() - swElapsed;
    swInterval = setInterval(() => {
      swElapsed = Date.now() - start;
      renderSW(swElapsed);
    }, 10);
    swRunning = true;
    document.getElementById('sw-start-btn').textContent = '停止';
  }
}

function swLap() {
  if (!swRunning && swElapsed === 0) return;
  const lapTime = swElapsed - swLapStart;
  swLapStart = swElapsed;
  swLaps.unshift({ n: swLaps.length + 1, lap: lapTime, total: swElapsed });
  renderLaps();
}

function renderLaps() {
  const el = document.getElementById('laps');
  el.innerHTML = swLaps.map(l => {
    const lt = l.lap;
    const cs = Math.floor((lt % 1000) / 10);
    const s  = Math.floor(lt / 1000) % 60;
    const m  = Math.floor(lt / 60000);
    const tt = l.total;
    const tcs = Math.floor((tt % 1000) / 10);
    const ts  = Math.floor(tt / 1000) % 60;
    const tm  = Math.floor(tt / 60000);
    return `<div class="lap-item">
      <span class="lap-num">Lap ${l.n}</span>
      <span>${pad(m)}:${pad(s)}.${pad(cs)}</span>
      <span class="lap-total">${pad(tm)}:${pad(ts)}.${pad(tcs)}</span>
    </div>`;
  }).join('');
}

function swReset() {
  clearInterval(swInterval);
  swRunning = false;
  swElapsed = 0;
  swLapStart = 0;
  swLaps = [];
  renderSW(0);
  renderLaps();
  document.getElementById('sw-start-btn').textContent = 'スタート';
}

// ---- ポモドーロ ----
const POMO_WORK  = 25 * 60;
const POMO_SHORT = 5  * 60;
const POMO_LONG  = 15 * 60;

let pomoRunning = false;
let pomoInterval = null;
let pomoRemaining = POMO_WORK;
let pomoPhase = 'work';
let pomoCount = 0;
let pomoTotal = POMO_WORK;
let pomoAlarming = false;
let pomoAlarmLoop = null;
let pomoAlarmAutoStop = null;

function renderPomo(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  document.getElementById('pomo-display').textContent = `${pad(m)}:${pad(s)}`;
  const pct = pomoTotal > 0 ? (secs / pomoTotal) * 100 : 100;
  document.getElementById('pomo-progress').style.width = pct + '%';
  const tomatoes = document.querySelectorAll('.tomato');
  tomatoes.forEach((t, i) => t.classList.toggle('done', i < (pomoCount % 4)));
}

function pomoAlarmStart(onBreak) {
  pomoAlarming = true;
  const btn = document.getElementById('pomo-start-btn');
  btn.textContent = '次へ →';
  btn.onclick = () => { pomoAlarmStop(); pomoBeginNext(); };

  function ring() {
    if (onBreak) {
      beep(880, 0.18); setTimeout(() => beep(1100, 0.22), 220);
    } else {
      beep(550, 0.18); setTimeout(() => beep(440, 0.22), 220);
    }
  }
  ring();
  pomoAlarmLoop = setInterval(ring, 900);

  pomoAlarmAutoStop = setTimeout(() => {
    pomoAlarmStop();
    const b = document.getElementById('pomo-start-btn');
    b.textContent = 'スタート';
    b.onclick = pomoToggle;
  }, 15000);
}

function pomoAlarmStop() {
  clearInterval(pomoAlarmLoop);
  clearTimeout(pomoAlarmAutoStop);
  pomoAlarmLoop = null;
  pomoAlarmAutoStop = null;
  pomoAlarming = false;
}

function pomoBeginNext() {
  const btn = document.getElementById('pomo-start-btn');
  btn.onclick = pomoToggle;
  pomoToggle();
}

function pomoToggle() {
  if (pomoAlarming) return;

  if (pomoRunning) {
    clearInterval(pomoInterval);
    pomoRunning = false;
    document.getElementById('pomo-start-btn').textContent = '再開';
    return;
  }

  pomoRunning = true;
  document.getElementById('pomo-start-btn').textContent = '一時停止';

  pomoInterval = setInterval(() => {
    pomoRemaining--;
    renderPomo(pomoRemaining);
    if (pomoRemaining <= 0) {
      clearInterval(pomoInterval);
      pomoRunning = false;

      if (pomoPhase === 'work') {
        pomoCount++;
        if (pomoCount % 4 === 0) {
          pomoPhase = 'long';
          pomoRemaining = POMO_LONG;
          pomoTotal = POMO_LONG;
          document.getElementById('pomo-status').textContent = 'LONG BREAK';
          document.getElementById('pomo-status').className = 'pomodoro-status break';
          showToast('🍅 4セット完了！長い休憩 (15分)');
        } else {
          pomoPhase = 'short';
          pomoRemaining = POMO_SHORT;
          pomoTotal = POMO_SHORT;
          document.getElementById('pomo-status').textContent = 'BREAK';
          document.getElementById('pomo-status').className = 'pomodoro-status break';
          showToast('🍅 作業完了！休憩 (5分)');
        }
        pomoAlarmStart(true);
      } else {
        pomoPhase = 'work';
        pomoRemaining = POMO_WORK;
        pomoTotal = POMO_WORK;
        document.getElementById('pomo-status').textContent = 'WORK';
        document.getElementById('pomo-status').className = 'pomodoro-status work';
        showToast('☕ 休憩終了！作業を始めましょう');
        pomoAlarmStart(false);
      }
      renderPomo(pomoRemaining);
    }
  }, 1000);
}

function pomoReset() {
  clearInterval(pomoInterval);
  pomoAlarmStop();
  pomoRunning = false;
  pomoPhase = 'work';
  pomoCount = 0;
  pomoRemaining = POMO_WORK;
  pomoTotal = POMO_WORK;
  const btn = document.getElementById('pomo-start-btn');
  btn.textContent = 'スタート';
  btn.onclick = pomoToggle;
  document.getElementById('pomo-status').textContent = 'WORK';
  document.getElementById('pomo-status').className = 'pomodoro-status';
  renderPomo(POMO_WORK);
}
</script>
